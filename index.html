<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0015">
  <title>Para Você ❤️</title>
  <meta name="description" content="Uma surpresa especial feita com muito amor">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  
  <div class="stars-container" id="starsContainer"></div>

  <main class="container" id="mainContainer">
    <!-- Tela inicial -->
    <section class="screen active" id="screen1">
      <h1 class="title">Ei, tenho algo pra te mostrar... 💫</h1>
      <p class="subtitle">Clica no botão aqui embaixo</p>
      <button class="magic-button" id="magicButton">
        <span class="button-text">Clica aqui ❤️</span>
        <span class="button-glow"></span>
      </button>
    </section>

    <!-- Tela do quiz -->
    <section class="screen" id="screen2">
      <h2 class="quiz-title">O quanto você gosta do Matheus? 🤔</h2>
      <p class="quiz-subtitle">Escolha sabiamente...</p>
      <div class="quiz-options" id="quizOptions">
        <button class="quiz-option" data-value="0">0% 💔</button>
        <button class="quiz-option" data-value="25">25% 😐</button>
        <button class="quiz-option" data-value="50">50% 🤷</button>
        <button class="quiz-option" data-value="75">75% 😊</button>
        <button class="quiz-option" data-value="100">100% 😍</button>
      </div>
      <button class="confirm-button" id="confirmButton" disabled>
        <span class="button-text">Confirmar ✓</span>
        <span class="button-glow"></span>
      </button>
      <p class="quiz-feedback" id="quizFeedback" aria-live="polite"></p>
    </section>

    <!-- Tela do coração -->
    <section class="screen" id="screen3">
      <div class="heart-wrapper" id="heartWrapper">
        <div class="heart" id="heart">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" class="heart-svg">
            <defs>
              <linearGradient id="heartGrad" x1="0%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="#ff5c93"/>
                <stop offset="50%" stop-color="#ff2d6b"/>
                <stop offset="100%" stop-color="#c9185a"/>
              </linearGradient>
              <radialGradient id="heartShine" cx="35%" cy="30%" r="40%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
              </radialGradient>
            </defs>
            <path d="M256 477.5
              C 245 468, 20 287, 20 177
              C 20 95, 85 30, 155 30
              C 200 30, 237 55, 256 90
              C 275 55, 312 30, 357 30
              C 427 30, 492 95, 492 177
              C 492 287, 267 468, 256 477.5 Z"
              fill="url(#heartGrad)"/>
            <path d="M256 477.5
              C 245 468, 20 287, 20 177
              C 20 95, 85 30, 155 30
              C 200 30, 237 55, 256 90
              C 275 55, 312 30, 357 30
              C 427 30, 492 95, 492 177
              C 492 287, 267 468, 256 477.5 Z"
              fill="url(#heartShine)"/>
          </svg>
        </div>
      </div>
      <h2 class="love-title" id="loveTitle">Fresca!! ❤️</h2>
      <p class="love-message" id="loveMessage">Você é a melhor pessoa que já conheci!!</p>
      <button class="back-button" id="backButton">↩ Voltar ao início</button>
      <div class="floating-hearts" id="floatingHearts"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
